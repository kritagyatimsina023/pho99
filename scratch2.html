<!DOCTYPE html>
<html>
<head>
<style>
  body { background: #E1DED5; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; font-family: sans-serif; font-size: 80px; font-weight: bold;}
  
  .wrapper { position: relative; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; }
  
  .img-box { position: absolute; width: 300px; height: 400px; background: url('https://via.placeholder.com/300x400/ff0000/ffffff') center/cover; }
  
  .text { position: absolute; z-index: 10; color: white; mix-blend-mode: difference; }

  .text2 { position: absolute; z-index: 10; top: 100px; color: transparent; background: inherit; -webkit-background-clip: text; mix-blend-mode: overlay; }
</style>
</head>
<body>
<div class="wrapper">
  <div class="img-box"></div>
  <div class="text">COCKTAILS</div>
</div>
</body>
</html>
