<!DOCTYPE html>
<html>
<head>
<style>
  body { background: #E1DED5; }
  .container { position: relative; width: 100%; height: 100vh; display: flex; align-items: center; justify-center: center; }
  .img { position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); width: 300px; height: 400px; background: red; z-index: 10; }
  .text { position: absolute; z-index: 20; font-size: 100px; mix-blend-mode: overlay; color: black; }
</style>
</head>
<body>
<div class="container">
  <div class="img"></div>
  <h1 class="text">COCKTAILS</h1>
</div>
</body>
</html>
